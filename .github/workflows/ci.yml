name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Verify Maven version  
      run: mvn --version
      
    - name: Compile project
      run: mvn clean compile
      
    - name: Run tests
      run: mvn test
      
    - name: Generate test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Maven Tests
        path: target/surefire-reports/*.xml
        reporter: java-junit
        fail-on-error: true
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: target/surefire-reports/
        
    - name: Package application
      run: mvn package -DskipTests
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: jar-artifact
        path: target/*.jar

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Check code formatting
      run: mvn compile
      
    - name: Verify project structure
      run: |
        echo "Checking Maven project structure..."
        test -f pom.xml || (echo "❌ pom.xml not found" && exit 1)
        test -f src/main/java/com/techsupport/TechSupportApplication.java || (echo "❌ Main application class not found" && exit 1)
        test -f src/main/resources/application.yml || (echo "❌ Application config not found" && exit 1)
        test -d src/test/java || (echo "❌ Test directory not found" && exit 1)
        echo "✅ Project structure is valid"
        
    - name: Verify Spring Boot application
      run: |
        echo "Checking if Spring Boot application can start..."
        timeout 30s mvn spring-boot:run > /dev/null 2>&1 &
        PID=$!
        sleep 10
        if kill -0 $PID 2>/dev/null; then
          echo "✅ Spring Boot application started successfully"
          kill $PID
        else
          echo "❌ Spring Boot application failed to start"
          exit 1
        fi

  dependency-check:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Run dependency check
      run: |
        mvn dependency:tree
        mvn dependency:analyze